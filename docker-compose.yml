version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fullstack-challenge-db
    restart: always
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack_challenge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_challenge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: A web-based UI for managing your Postgres database
  pgadmin:
    image: dpage/pgadmin4
    container_name: fullstack-challenge-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
